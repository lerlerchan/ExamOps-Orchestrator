name: ExamOps — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}   # set in GitHub repo vars

jobs:
  # ── Job 1: Unit tests ─────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ── Job 2: Deploy to Azure Functions ─────────────────────────────────────
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install runtime dependencies into .python_packages
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Stage function directories at deployment root
        run: |
          # Azure Functions v1 Python model discovers function dirs at the root of the app.
          # Our functions live under src/functions/ — copy them all to root before zipping.
          for func_dir in src/functions/*/; do
            func_name=$(basename "$func_dir")
            cp -r "$func_dir" "./$func_name"
            echo "Staged: $func_name"
          done
          # Also stage web assets at root so serve_web/__init__.py can find index.html
          # via both _HTML_PATH (src/web/index.html) and _ALT_HTML_PATH (web/index.html)
          cp -r src/web ./web

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude ".env" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "tests/*" \
            --exclude "e2e/*" \
            --exclude "frontend/*" \
            --exclude "node_modules/*" \
            --exclude "examops-deploy.zip" \
            --exclude "deploy.zip"
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group rg-examops-prod \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --src deploy.zip \
            --build-remote false \
            --timeout 300

      - name: Smoke test deployed functions
        run: |
          sleep 30
          BASE="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net"

          check() {
            local url="$1" method="$2" expect="$3"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X "$method" "$url")
            if echo "$expect" | grep -q "$STATUS"; then
              echo "✅ $method $url → $STATUS"
            else
              echo "❌ $method $url → $STATUS (expected one of: $expect)"
              exit 1
            fi
          }

          check "$BASE/api/web"                 GET  "200"
          check "$BASE/api/format-exam"         POST "400"
          check "$BASE/api/upload-syllabus"     POST "400"
          check "$BASE/api/upload-materials"    POST "400"
          check "$BASE/api/chat"                POST "400"
          check "$BASE/api/fill-moderation-form" POST "400"
          check "$BASE/api/export-questions"    POST "400"

          echo "All smoke tests passed."

      - name: Azure logout
        if: always()
        run: az logout
